<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}HackerTrap{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="header">
    <div class="brand">
      <span class="logo">⬡</span>
      <div>
        <strong>HackerTrap</strong>
        <small>hackertraps.com</small>
      </div>
    </div>
    {% block header_extra %}{% endblock %}
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <footer class="footer">
    Device {{ device_id }} · {{ hostname }}
  </footer>
</body>
</html>
